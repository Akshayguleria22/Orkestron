# ── Orkestron Production Stack ──
# Full deployment with Nginx reverse proxy, backend, frontend, and all services.

version: "3.9"

services:
  # ─── Reverse Proxy ───
  nginx:
    image: nginx:1.25-alpine
    container_name: orkestron-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/orkestron.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    restart: always

  # ─── FastAPI Backend ───
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orkestron-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@postgres:5432/Orkestran
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: https://orkestron.yourdomain.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      RATE_LIMIT_PER_MINUTE: "120"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: always

  # ─── Next.js Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8000}
    container_name: orkestron-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:8000}
    restart: always

  # ─── Core Infrastructure ───
  postgres:
    image: postgres:16-alpine
    container_name: orkestron-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: Orkestran
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: orkestron-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: orkestron-qdrant
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: orkestron-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  grafana:
    image: grafana/grafana:10.4.1
    container_name: orkestron-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-orkestron}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

  loki:
    image: grafana/loki:2.9.4
    container_name: orkestron-loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  prometheusdata:
  grafanadata:
  lokidata:
